<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InsightMatch — رادار المباريات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Changa:wght@500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A100D; --panel:#121B16; --raised:#18251E; --line:#25382C;
    --ink:#F0F6F1; --muted:#8FA697; --chip:#1C2B22;
    --v1:#FFB224; --v1-soft:rgba(255,178,36,.14);
    --v2:#4ED9EA; --v2-soft:rgba(78,217,234,.14);
    --green:#53C57F; --red:#E2615E; --live:#FF5D5B;
    --engine:var(--v1); --engine-soft:var(--v1-soft);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"IBM Plex Sans Arabic",system-ui,sans-serif;
    font-size:15px; line-height:1.55;
    font-feature-settings:"tnum";
    min-height:100vh;
  }
  body::before{ /* خط منتصف الملعب — خيط ضوئي خافت أعلى الصفحة */
    content:""; position:fixed; inset:0 0 auto 0; height:2px; z-index:30;
    background:linear-gradient(90deg,transparent,var(--engine),transparent);
    opacity:.85; transition:background .3s;
  }
  a{color:inherit}
  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
  img{display:block}

  /* ======== الشريط العلوي ======== */
  header{
    position:sticky;top:0;z-index:20;
    background:rgba(10,16,13,.92);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
    padding:10px 16px;
    display:flex;align-items:center;justify-content:space-between;gap:8px;
  }
  .brand{font-family:Changa;font-weight:800;font-size:21px;letter-spacing:.3px}
  .brand em{color:var(--engine);font-style:normal;transition:color .3s}
  .meta-row{display:flex;align-items:center;gap:8px}
  #updated{font-size:11.5px;color:var(--muted);white-space:nowrap}
  #langBtn{
    background:var(--chip);border:1px solid var(--line);
    border-radius:999px;padding:4px 12px;font-size:12.5px;font-weight:600;
  }
  button:focus-visible,details summary:focus-visible{
    outline:2px solid var(--engine);outline-offset:2px;
  }

  main{max-width:680px;margin:0 auto;padding:16px 16px 60px}

  /* ======== مبدّل المحركات (لوحتا قناة بث) ======== */
  .engines{
    display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:4px 0 6px;
  }
  .engine-tab{
    position:relative;border:1px solid var(--line);border-radius:14px;
    background:var(--panel);padding:12px 14px 10px;text-align:start;
    transition:border-color .2s, background .2s;
  }
  .engine-tab .tag{
    font-family:Changa;font-weight:700;font-size:11px;letter-spacing:1.5px;
    color:var(--muted);text-transform:uppercase;
  }
  .engine-tab .name{font-family:Changa;font-weight:700;font-size:18px;margin-top:2px}
  .engine-tab .desc{font-size:11px;color:var(--muted);margin-top:1px}
  .engine-tab .lamp{
    position:absolute;top:12px;inset-inline-end:12px;width:8px;height:8px;border-radius:50%;
    background:var(--line);
  }
  .engine-tab.active{background:var(--raised)}
  .engine-tab.e1.active{border-color:var(--v1)}
  .engine-tab.e1.active .lamp{background:var(--v1);box-shadow:0 0 10px var(--v1)}
  .engine-tab.e1.active .name{color:var(--v1)}
  .engine-tab.e2.active{border-color:var(--v2)}
  .engine-tab.e2.active .lamp{background:var(--v2);box-shadow:0 0 10px var(--v2)}
  .engine-tab.e2.active .name{color:var(--v2)}

  /* ======== عناوين الأقسام ======== */
  .sec{margin-top:26px}
  .sec-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .sec-head h2{
    font-family:Changa;font-weight:600;font-size:16px;letter-spacing:.5px;
    text-transform:uppercase;
  }
  .sec-head .rule{flex:1;height:1px;background:var(--line)}
  .sec-head .count{
    background:var(--chip);border:1px solid var(--line);color:var(--muted);
    font-size:11.5px;font-weight:600;border-radius:999px;padding:1px 10px;min-width:30px;text-align:center;
  }
  .live-dot{width:9px;height:9px;border-radius:50%;background:var(--live);
    box-shadow:0 0 8px var(--live);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  @media (prefers-reduced-motion:reduce){
    .live-dot{animation:none}
    html{scroll-behavior:auto}
  }

  .empty{
    background:var(--panel);border:1px dashed var(--line);border-radius:14px;
    color:var(--muted);text-align:center;padding:22px 14px;font-size:13.5px;
  }

  /* ======== شارات الفرق (شعار أو حرف) ======== */
  .badge{
    position:relative;width:44px;height:44px;border-radius:50%;flex:0 0 44px;
    background:var(--chip);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    font-family:Changa;font-weight:700;font-size:18px;color:var(--muted);
    overflow:hidden;
  }
  .badge img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:5px;background:var(--chip)}
  .badge.sm{width:22px;height:22px;flex:0 0 22px;font-size:11px}
  .badge.sm img{padding:2px}

  /* ======== بطاقات المباريات الحية ======== */
  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:14px;margin-bottom:10px;
  }
  .league-eyebrow{
    display:flex;align-items:center;gap:7px;
    font-size:11.5px;color:var(--muted);margin-bottom:10px;
  }
  .scoreboard{
    display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;
  }
  .side{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
  .side .tname{font-weight:600;font-size:13.5px;line-height:1.3}
  .score{
    font-family:Changa;font-weight:800;font-size:30px;letter-spacing:1px;
    text-align:center;white-space:nowrap;
  }
  .minute{
    display:inline-block;background:var(--v1-soft);color:var(--v1);
    border-radius:999px;padding:1px 10px;font-size:12px;font-weight:700;margin-top:2px;
  }

  /* ======== بطاقات التوقعات ======== */
  .league-title{
    display:flex;align-items:center;gap:8px;
    font-family:Changa;font-weight:600;font-size:14px;color:var(--muted);
    margin:18px 2px 8px;
  }
  .league-title .star{color:var(--engine)}
  details.pred{
    background:var(--panel);border:1px solid var(--line);border-radius:16px;
    margin-bottom:10px;overflow:hidden;
  }
  details.pred summary{list-style:none;cursor:pointer;padding:13px 14px 12px}
  details.pred summary::-webkit-details-marker{display:none}
  details.pred[open]{border-color:var(--engine)}
  .duel{
    display:grid;grid-template-columns:auto 1fr auto 1fr auto;gap:8px;align-items:center;
  }
  .duel .tname{font-weight:600;font-size:13.5px;line-height:1.3}
  .duel .tname.h{text-align:start}
  .duel .tname.a{text-align:end}
  .ko{
    font-family:Changa;font-weight:700;font-size:13px;color:var(--muted);
    background:var(--chip);border:1px solid var(--line);border-radius:10px;
    padding:3px 9px;white-space:nowrap;text-align:center;
  }
  .verdict{
    display:flex;align-items:center;gap:10px;margin-top:11px;
  }
  .pick{
    font-size:12.5px;font-weight:700;color:var(--engine);
    background:var(--engine-soft);border-radius:999px;padding:3px 12px;
    white-space:nowrap;max-width:60%;overflow:hidden;text-overflow:ellipsis;
  }
  .pick.draw{color:var(--muted);background:var(--chip)}
  .confbar{flex:1;height:6px;border-radius:999px;background:var(--chip);overflow:hidden}
  .confbar i{display:block;height:100%;border-radius:999px;background:var(--engine);transition:width .4s}
  .conf-num{font-family:Changa;font-weight:700;font-size:14px;min-width:38px;text-align:end}
  .reason{
    border-top:1px solid var(--line);padding:11px 14px;font-size:13px;color:var(--muted);
  }

  /* ======== سجل الدقة ======== */
  .acc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .acc-box{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:12px 14px;
  }
  .acc-box .label{font-size:11.5px;color:var(--muted)}
  .acc-box .value{font-family:Changa;font-weight:800;font-size:26px;color:var(--engine);margin-top:2px}
  .acc-box .sub{font-size:11px;color:var(--muted)}
  .buckets{margin-top:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .bucket{
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
    text-align:center;padding:8px 4px;
  }
  .bucket .b-label{font-size:10.5px;color:var(--muted)}
  .bucket .b-val{font-family:Changa;font-weight:700;font-size:16px}

  /* ======== النتائج الأخيرة ======== */
  .res{
    display:flex;align-items:center;gap:10px;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:10px 12px;margin-bottom:8px;font-size:13px;
  }
  .res .pair{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
  .res .names{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .res .fscore{font-family:Changa;font-weight:700;white-space:nowrap}
  .res .mark{font-family:Changa;font-weight:800;font-size:15px;flex:0 0 auto}
  .res .mark.ok{color:var(--green)}
  .res .mark.no{color:var(--red)}

  /* ======== لوحة "قيد الإنشاء" للمحرك 2 ======== */
  .construct{
    background:var(--panel);border:1px solid var(--v2);border-radius:16px;
    padding:20px 16px;
  }
  .construct h3{font-family:Changa;font-weight:700;font-size:18px;color:var(--v2)}
  .construct p{font-size:13.5px;color:var(--muted);margin-top:8px}
  .construct ul{margin:10px 18px 0;font-size:13px;color:var(--ink)}
  .construct li{margin-bottom:5px}

  /* ======== الأخبار ======== */
  .news-item{
    display:block;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:11px 14px;margin-bottom:8px;text-decoration:none;
  }
  .news-item .n-title{font-size:13.5px;font-weight:500;line-height:1.45}
  .news-item .n-meta{font-size:11px;color:var(--muted);margin-top:4px}

  footer{
    max-width:680px;margin:0 auto;padding:0 16px 30px;
    font-size:11px;color:var(--muted);text-align:center;
  }
  .hidden{display:none !important}
</style>
</head>
<body>

<header>
  <div class="brand">Insight<em>Match</em></div>
  <div class="meta-row">
    <span id="updated"></span>
    <button id="langBtn" aria-label="Language">EN</button>
  </div>
</header>

<main>

  <!-- مبدّل المحركات -->
  <div class="engines" role="tablist">
    <button class="engine-tab e1 active" id="tab-v1" role="tab" aria-selected="true">
      <span class="lamp"></span>
      <div class="tag">ENGINE</div>
      <div class="name" data-i="e1name">المحرك 1</div>
      <div class="desc" data-i="e1desc">التوقعات اليومية</div>
    </button>
    <button class="engine-tab e2" id="tab-v2" role="tab" aria-selected="false">
      <span class="lamp"></span>
      <div class="tag">ENGINE</div>
      <div class="name" data-i="e2name">المحرك 2</div>
      <div class="desc" data-i="e2desc">الجيل الذكي — Fable 5</div>
    </button>
  </div>

  <!-- الحية الآن (مشتركة بين المحركين) -->
  <section class="sec">
    <div class="sec-head">
      <span class="live-dot" aria-hidden="true"></span>
      <h2 data-i="live">مباشر الآن</h2>
      <span class="rule"></span>
      <span class="count" id="live-count">0</span>
    </div>
    <div id="live-list"></div>
  </section>

  <!-- محتوى المحرك النشط -->
  <div id="engine-body">

    <section class="sec">
      <div class="sec-head">
        <h2 data-i="upcoming">توقعات الـ 24 ساعة</h2>
        <span class="rule"></span>
        <span class="count" id="up-count">0</span>
      </div>
      <div id="upcoming-list"></div>
    </section>

    <section class="sec">
      <div class="sec-head">
        <h2 data-i="accuracy">سجل الدقة</h2>
        <span class="rule"></span>
      </div>
      <div id="acc-body"></div>
    </section>

    <section class="sec">
      <div class="sec-head">
        <h2 data-i="results">آخر النتائج المُقيَّمة</h2>
        <span class="rule"></span>
        <span class="count" id="res-count">0</span>
      </div>
      <div id="res-list"></div>
    </section>

  </div>

  <!-- الأخبار (مشتركة) -->
  <section class="sec">
    <div class="sec-head">
      <h2 data-i="news">آخر الأخبار</h2>
      <span class="rule"></span>
    </div>
    <div id="news-list"></div>
  </section>

</main>

<footer data-i="disclaimer">التوقعات آراء تحليلية مبنية على المعطيات — ليست ضمانات.</footer>

<script>
"use strict";

/* ================= الترجمة ================= */
var I18N = {
  ar: {
    e1name:"المحرك 1", e1desc:"التوقعات اليومية",
    e2name:"المحرك 2", e2desc:"الجيل الذكي — Fable 5",
    live:"مباشر الآن", upcoming:"توقعات الـ 24 ساعة",
    accuracy:"سجل الدقة", results:"آخر النتائج المُقيَّمة", news:"آخر الأخبار",
    noLive:"لا توجد مباريات حية الآن — يوم راحة أو بين الجولات.",
    noUpcoming:"لا توجد توقعات قادمة حالياً.",
    noAcc:"لا يوجد سجل بعد — يبدأ الحساب بعد أول نتائج مُقيَّمة.",
    noRes:"لا توجد نتائج مُقيَّمة بعد.",
    noNews:"لا توجد أخبار حالياً.",
    pickHome:"فوز", pickAway:"فوز", pickDraw:"تعادل",
    accOverall:"الإجمالي", acc30:"آخر 30 يوماً",
    accTop:"الدوريات الكبرى", accOther:"بقية الدوريات",
    otherLeagues:"دوريات أخرى",
    updated:"آخر تحديث",
    v2title:"المحرك 2 قيد الإنشاء",
    v2p:"محرك توقعات من جيل جديد يجري بناؤه الآن، وسيعمل جنباً إلى جنب مع المحرك 1 للمقارنة المباشرة:",
    v2f1:"يعمل بنموذج Claude Fable 5 — الأذكى لدى Anthropic",
    v2f2:"بيانات أعمق لكل مباراة: الترتيب، المواجهات المباشرة، الإصابات، التشكيلات",
    v2f3:"يتعلم من أخطائه: مراجعة ذاتية مكتوبة لكل توقع خاطئ",
    v2f4:"احتمالات كاملة للنتائج الثلاث بدل توقع واحد",
    disclaimer:"التوقعات آراء تحليلية مبنية على المعطيات — ليست ضمانات."
  },
  en: {
    e1name:"Engine 1", e1desc:"Daily predictions",
    e2name:"Engine 2", e2desc:"Smart gen — Fable 5",
    live:"LIVE NOW", upcoming:"Next 24h predictions",
    accuracy:"Accuracy record", results:"Latest graded results", news:"Latest news",
    noLive:"No live matches right now — rest day or between rounds.",
    noUpcoming:"No upcoming predictions at the moment.",
    noAcc:"No record yet — starts after the first graded results.",
    noRes:"No graded results yet.",
    noNews:"No news right now.",
    pickHome:"Win", pickAway:"Win", pickDraw:"Draw",
    accOverall:"Overall", acc30:"Last 30 days",
    accTop:"Top leagues", accOther:"Other leagues",
    otherLeagues:"Other leagues",
    updated:"Updated",
    v2title:"Engine 2 is under construction",
    v2p:"A new-generation prediction engine is being built now. It will run side by side with Engine 1 for a live comparison:",
    v2f1:"Powered by Claude Fable 5 — Anthropic's smartest model",
    v2f2:"Deeper data per match: standings, head-to-head, injuries, lineups",
    v2f3:"Learns from its mistakes: a written self-review of every wrong prediction",
    v2f4:"Full probabilities for all three outcomes instead of a single pick",
    disclaimer:"Predictions are analytical opinions based on data — never guarantees."
  }
};
var lang = "ar";
try { lang = localStorage.getItem("im-lang") || "ar"; } catch(e){}
function t(k){ return (I18N[lang] && I18N[lang][k]) || I18N.ar[k] || k; }

var engine = "v1";
try { engine = localStorage.getItem("im-engine") || "v1"; } catch(e){}

var lastV1 = null, lastV2 = null, v2exists = false;

/* ================= أدوات ================= */
function esc(s){
  return String(s == null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}
function timeLocal(iso){
  try {
    var d = new Date(iso);
    return d.toLocaleTimeString(lang === "ar" ? "ar-u-nu-latn" : "en-GB",
      {hour:"2-digit", minute:"2-digit"});
  } catch(e){ return ""; }
}
function pctOf(o){
  if (!o || !o.total) return null;
  return Math.round(100 * o.correct / o.total);
}
function badge(name, logo, small){
  var initial = esc(String(name||"?").trim().charAt(0) || "?");
  var img = logo ? '<img src="'+esc(logo)+'" alt="" loading="lazy" onerror="this.remove()">' : "";
  return '<span class="badge'+(small?" sm":"")+'" aria-hidden="true">'+initial+img+'</span>';
}

/* ================= اللغة ================= */
function applyLang(){
  document.documentElement.lang = lang;
  document.documentElement.dir = (lang === "ar") ? "rtl" : "ltr";
  document.getElementById("langBtn").textContent = (lang === "ar") ? "EN" : "ع";
  var nodes = document.querySelectorAll("[data-i]");
  for (var i=0;i<nodes.length;i++) nodes[i].textContent = t(nodes[i].getAttribute("data-i"));
}
document.getElementById("langBtn").addEventListener("click", function(){
  lang = (lang === "ar") ? "en" : "ar";
  try { localStorage.setItem("im-lang", lang); } catch(e){}
  applyLang();
  renderAll();
});

/* ================= مبدّل المحركات ================= */
function applyEngine(){
  var isV2 = (engine === "v2");
  document.getElementById("tab-v1").classList.toggle("active", !isV2);
  document.getElementById("tab-v2").classList.toggle("active", isV2);
  document.getElementById("tab-v1").setAttribute("aria-selected", String(!isV2));
  document.getElementById("tab-v2").setAttribute("aria-selected", String(isV2));
  var r = document.documentElement.style;
  r.setProperty("--engine", isV2 ? "var(--v2)" : "var(--v1)");
  r.setProperty("--engine-soft", isV2 ? "var(--v2-soft)" : "var(--v1-soft)");
}
function setEngine(e){
  engine = e;
  try { localStorage.setItem("im-engine", e); } catch(ex){}
  applyEngine();
  renderAll();
}
document.getElementById("tab-v1").addEventListener("click", function(){ setEngine("v1"); });
document.getElementById("tab-v2").addEventListener("click", function(){ setEngine("v2"); });

/* ================= العرض ================= */
function renderLive(list){
  var el = document.getElementById("live-list");
  document.getElementById("live-count").textContent = list.length;
  if (!list.length){ el.innerHTML = '<div class="empty">'+t("noLive")+"</div>"; return; }
  var h = "";
  for (var i=0;i<list.length;i++){
    var m = list[i];
    var sc = esc(m.score).split("-");
    h += '<div class="card">'
      + '<div class="league-eyebrow">'
      + (m.league_logo ? badge(m.league, m.league_logo, true) : "")
      + '<span>'+esc(m.league)+'</span></div>'
      + '<div class="scoreboard">'
      + '<div class="side">'+badge(m.home, m.home_logo)+'<span class="tname">'+esc(m.home)+'</span></div>'
      + '<div><div class="score">'+esc(sc[0])+' – '+esc(sc[1])+'</div>'
      + '<div style="text-align:center"><span class="minute">'
      + (m.status==="HT" ? "HT" : esc(m.minute)+"'") + '</span></div></div>'
      + '<div class="side">'+badge(m.away, m.away_logo)+'<span class="tname">'+esc(m.away)+'</span></div>'
      + '</div></div>';
  }
  el.innerHTML = h;
}

function pickText(p, home, away){
  if (p === "draw") return t("pickDraw");
  return (p === "home" ? t("pickHome")+" "+home : t("pickAway")+" "+away);
}

function renderUpcoming(list){
  var el = document.getElementById("upcoming-list");
  document.getElementById("up-count").textContent = list.length;
  if (!list.length){ el.innerHTML = '<div class="empty">'+t("noUpcoming")+"</div>"; return; }

  var h = "", curLeague = null, inOther = false;
  for (var i=0;i<list.length;i++){
    var p = list[i];
    if (!p.top && !inOther){
      h += '<div class="league-title">'+t("otherLeagues")+'</div>';
      inOther = true; curLeague = null;
    }
    if (p.top && p.league !== curLeague){
      h += '<div class="league-title"><span class="star">★</span>'
        + (p.league_logo ? badge(p.league, p.league_logo, true) : "")
        + esc(p.league)+'</div>';
      curLeague = p.league;
    }
    var home = (lang==="en" && p.home_en) ? p.home_en : p.home;
    var away = (lang==="en" && p.away_en) ? p.away_en : p.away;
    var pk = pickText(p.pick, home, away);
    h += '<details class="pred"><summary>'
      + '<div class="duel">'
      + badge(home, p.home_logo)
      + '<span class="tname h">'+esc(home)+'</span>'
      + '<span class="ko">'+timeLocal(p.kickoff)+'</span>'
      + '<span class="tname a">'+esc(away)+'</span>'
      + badge(away, p.away_logo)
      + '</div>'
      + '<div class="verdict">'
      + '<span class="pick '+(p.pick==="draw"?"draw":"")+'">'+esc(pk)+'</span>'
      + '<span class="confbar"><i style="width:'+(p.confidence||0)+'%"></i></span>'
      + '<span class="conf-num">'+esc(p.confidence)+'%</span>'
      + '</div>'
      + (!p.top ? '<div class="league-eyebrow" style="margin:8px 0 0">'+esc(p.league)+'</div>' : "")
      + '</summary>'
      + (p.reason ? '<div class="reason">'+esc(p.reason)+'</div>' : "")
      + '</details>';
  }
  el.innerHTML = h;
}

function accBox(label, obj){
  var p = pctOf(obj);
  return '<div class="acc-box"><div class="label">'+label+'</div>'
    + '<div class="value">'+(p===null?"—":p+"%")+'</div>'
    + '<div class="sub">'+(obj&&obj.total? obj.correct+"/"+obj.total : "")+'</div></div>';
}

function renderAccuracy(acc){
  var el = document.getElementById("acc-body");
  if (!acc || !acc.overall || !acc.overall.total){
    el.innerHTML = '<div class="empty">'+t("noAcc")+"</div>"; return;
  }
  var h = '<div class="acc-grid">'
    + accBox(t("accOverall"), acc.overall)
    + accBox(t("acc30"), acc.last30)
    + accBox(t("accTop"), acc.top_leagues)
    + accBox(t("accOther"), acc.other_leagues)
    + '</div>';
  var bc = acc.by_confidence || {};
  var keys = ["70+","60-69","50-59","<50"];
  var any = false;
  var bh = '<div class="buckets">';
  for (var i=0;i<keys.length;i++){
    var o = bc[keys[i]];
    var p = pctOf(o);
    if (p !== null) any = true;
    bh += '<div class="bucket"><div class="b-label">'+esc(keys[i])+'%</div>'
      + '<div class="b-val">'+(p===null?"—":p+"%")+'</div></div>';
  }
  bh += '</div>';
  el.innerHTML = h + (any ? bh : "");
}

function renderResults(list){
  var el = document.getElementById("res-list");
  document.getElementById("res-count").textContent = list.length;
  if (!list.length){ el.innerHTML = '<div class="empty">'+t("noRes")+"</div>"; return; }
  var h = "";
  for (var i=0;i<list.length;i++){
    var r = list[i];
    h += '<div class="res">'
      + '<span class="mark '+(r.correct?"ok":"no")+'">'+(r.correct?"✓":"✗")+'</span>'
      + '<div class="pair">'
      + badge(r.home, r.home_logo, true)
      + '<span class="names">'+esc(r.home)+' × '+esc(r.away)+'</span>'
      + '</div>'
      + '<span class="fscore">'+esc(r.score)+'</span>'
      + '<span class="conf-num">'+esc(r.confidence)+'%</span>'
      + '</div>';
  }
  el.innerHTML = h;
}

function renderNews(list){
  var el = document.getElementById("news-list");
  if (!list || !list.length){ el.innerHTML = '<div class="empty">'+t("noNews")+"</div>"; return; }
  var h = "";
  for (var i=0;i<list.length;i++){
    var n = list[i];
    h += '<a class="news-item" href="'+esc(n.link)+'" target="_blank" rel="noopener">'
      + '<div class="n-title">'+esc(n.title)+'</div>'
      + '<div class="n-meta">'+esc(n.source||"")+(n.time? " · "+timeLocal(n.time):"")+'</div>'
      + '</a>';
  }
  el.innerHTML = h;
}

function renderConstruction(){
  var h = '<div class="construct">'
    + '<h3>'+t("v2title")+'</h3>'
    + '<p>'+t("v2p")+'</p>'
    + '<ul>'
    + '<li>'+t("v2f1")+'</li>'
    + '<li>'+t("v2f2")+'</li>'
    + '<li>'+t("v2f3")+'</li>'
    + '<li>'+t("v2f4")+'</li>'
    + '</ul></div>';
  document.getElementById("upcoming-list").innerHTML = h;
  document.getElementById("up-count").textContent = "0";
  document.getElementById("acc-body").innerHTML = '<div class="empty">'+t("noAcc")+'</div>';
  document.getElementById("res-list").innerHTML = '<div class="empty">'+t("noRes")+'</div>';
  document.getElementById("res-count").textContent = "0";
}

function renderAll(){
  var base = lastV1 || {};
  renderLive(base.live || []);
  renderNews(base.news || []);
  if (base.updated){
    document.getElementById("updated").textContent = t("updated")+" "+timeLocal(base.updated);
  }
  if (engine === "v2"){
    if (v2exists && lastV2){
      renderUpcoming(lastV2.upcoming || []);
      renderAccuracy(lastV2.accuracy);
      renderResults(lastV2.recent_results || []);
    } else {
      renderConstruction();
    }
  } else {
    renderUpcoming(base.upcoming || []);
    renderAccuracy(base.accuracy);
    renderResults(base.recent_results || []);
  }
}

/* ================= جلب البيانات ================= */
function fetchJSON(url){
  return fetch(url+"?t="+Date.now(), {cache:"no-store"}).then(function(r){
    if (!r.ok) throw new Error(String(r.status));
    return r.json();
  });
}
function load(){
  fetchJSON("data.json").then(function(d){
    lastV1 = d; renderAll();
  }).catch(function(){ /* نبقي آخر بيانات معروضة */ });

  fetchJSON("data_v2.json").then(function(d){
    lastV2 = d; v2exists = true;
    if (engine === "v2") renderAll();
  }).catch(function(){ v2exists = false; });
}

applyLang();
applyEngine();
renderAll();
load();
setInterval(load, 90000);
</script>
</body>
</html>
