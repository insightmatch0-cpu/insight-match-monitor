name: Daily Predictions V2

on:
  schedule:
    - cron: "30 3 * * *"    # يومياً 03:30 UTC = 06:30 صباحاً بتوقيت السعودية (بعد المحرك 1 بربع ساعة)
  workflow_dispatch:         # زر تشغيل يدوي

permissions:
  contents: write

concurrency:
  group: football-monitor
  cancel-in-progress: false

jobs:
  predict_v2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run V2 predictions
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python predict_v2.py

      - name: Update dashboard data
        run: python dashboard_update.py

      - name: Save data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add predictions_v2.json lessons_v2.json news.json data.json
          if [ -f data_v2.json ]; then git add data_v2.json; fi
          git diff --cached --quiet || git commit -m "engine 2 predictions [skip ci]"
          git pull --rebase origin main || true
          git push
