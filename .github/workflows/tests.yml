name: Quality Gate (tests)

# بوابة الجودة (توجيه المالك 2026-07-18): كل تغيير في الكود يمر على المُختبِر
# الآلي أولاً — كل إصلاح سابق محروس باختبار دائم حتى لا يعود الخطأ أبداً.
on:
  push:
    branches: ["main"]
    paths: ["*.py", "index.html", "tests/**", ".github/workflows/tests.yml"]
  pull_request:
    paths: ["*.py", "index.html", "tests/**", ".github/workflows/tests.yml"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      # كل السكربتات تُجمَّع — خطأ صياغة واحد يوقف البوابة
      - name: Compile all scripts
        run: python -m py_compile monitor.py scan.py predict.py predict_v2.py dashboard_update.py watchlist.py watchdog.py

      # المجموعة الكاملة: المحرك 2، اللوحة، الواجهة، قائمة التركيز
      - name: Run test suite
        run: python -m unittest discover tests -v
