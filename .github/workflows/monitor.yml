name: Football Monitor

on:
  schedule:
    - cron: "7,27,47 * * * *"
   # كل 20 دقيقة (يترك رصيداً يومياً لأزرار المسح الحي)
  workflow_dispatch:          # زر تشغيل يدوي للتجربة

permissions:
  contents: write
  actions: write        # يلزم حارس الجدولة لتشغيل توقعات فاتها موعدها

concurrency:
  group: football-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Update dashboard data
        run: python dashboard_update.py

      # حارس الجدولة: إذا أهملت GitHub تشغيلات التوقعات اليومية يشغّلها بنفسه
      - name: Scheduler watchdog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python watchdog.py

      - name: Save state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add state.json data.json news.json
          git diff --cached --quiet || git commit -m "update state [skip ci]"
          git pull --rebase origin main || true
          git push
