name: Football Monitor

on:
  schedule:
    - cron: "2,12,22,32,42,52 * * * *"
   # كل 10 دقائق — تنبيهات أسرع للأهداف (خطة Pro تتحمل الاستهلاك بسهولة)
  workflow_dispatch:          # زر تشغيل يدوي للتجربة

permissions:
  contents: write
  actions: write        # يلزم حارس الجدولة لتشغيل توقعات فاتها موعدها

concurrency:
  group: football-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      # أوامر تيليجرام: قائمة التركيز + تشغيل المسح الحي برسالة
      - name: Telegram commands & watchlist
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python watchlist.py

      - name: Run monitor
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Update dashboard data
        run: python dashboard_update.py

      # حارس الجدولة: إذا أهملت GitHub تشغيلات التوقعات اليومية يشغّلها بنفسه
      - name: Scheduler watchdog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python watchdog.py

      - name: Save state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add state.json data.json news.json
          if [ -f watchlist.json ]; then git add watchlist.json; fi
          if [ -f data_v2.json ]; then git add data_v2.json; fi
          git diff --cached --quiet || git commit -m "update state [skip ci]"
          git pull --rebase origin main || true
          git push
