name: Daily Predictions

on:
  schedule:
    - cron: "15 3 * * *"    # يومياً 03:15 UTC = 06:15 صباحاً بتوقيت السعودية
    - cron: "15 4 * * *"    # تشغيلة احتياطية إذا أهملت GitHub الأولى (تُتخطى إن نجحت)
  workflow_dispatch:         # زر تشغيل يدوي

permissions:
  contents: write

concurrency:
  group: football-monitor
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      # حارس التشغيلة الاحتياطية: إذا نجحت تشغيلة اليوم مسبقاً نتخطى (للجدولة فقط)
      - name: Skip if already ran today
        id: guard
        if: github.event_name == 'schedule'
        run: |
          python - <<'EOF' >> "$GITHUB_OUTPUT"
          import json
          from datetime import datetime, timezone
          try:
              lr = ((json.load(open("predictions.json", encoding="utf-8")).get("meta") or {}).get("last_run") or "")
          except Exception:
              lr = ""
          today = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          print("skip=" + ("true" if lr[:10] == today else "false"))
          EOF

      - name: Run predictions
        if: steps.guard.outputs.skip != 'true'
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python predict.py

      - name: Update dashboard data
        run: python dashboard_update.py

      - name: Save data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add predictions.json news.json data.json
          if [ -f data_v2.json ]; then git add data_v2.json; fi
          if [ -f predictions_user.json ]; then git add predictions_user.json; fi
          git diff --cached --quiet || git commit -m "daily predictions [skip ci]"
          # دفع مع إعادة المحاولة: عند تعارض مع commit موازٍ نحتفظ بملفاتنا المولّدة (الأحدث)
          ok=0
          for i in 1 2 3 4 5; do
            if git pull --rebase -X theirs origin main && git push; then ok=1; break; fi
            git rebase --abort 2>/dev/null || true
            sleep 5
          done
          [ "$ok" = "1" ]
